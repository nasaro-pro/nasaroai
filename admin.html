<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nasaro AI 관리자</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.5; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px 48px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: #94a3b8; font-size: 13px; margin-bottom: 20px; }
    a { color: #a78bfa; }
    .login-box, .panel { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #f8fafc; margin: 8px 0 12px; }
    button { padding: 9px 14px; border-radius: 8px; border: none; background: #7c3aed; color: #fff; font-weight: 600; cursor: pointer; }
    button.secondary { background: #334155; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .stat { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 12px; }
    .stat b { display: block; font-size: 22px; color: #c4b5fd; }
    .stat span { font-size: 12px; color: #94a3b8; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { border-bottom: 1px solid #334155; padding: 8px 6px; text-align: left; vertical-align: top; }
    th { color: #94a3b8; font-weight: 600; }
    .err { color: #fca5a5; font-size: 13px; min-height: 18px; }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Nasaro AI 관리자</h1>
        <p class="sub">회원 · 사용량 · 결과물 현황</p>
      </div>
      <div>
        <a href="/">← 메인으로</a>
        <button id="logoutBtn" class="secondary" type="button" style="display:none;margin-left:8px;">로그아웃</button>
      </div>
    </div>

    <div id="loginView" class="login-box">
      <strong>관리자 로그인</strong>
      <input id="adminPassword" type="password" placeholder="관리자 비밀번호" autocomplete="current-password">
      <div id="loginErr" class="err"></div>
      <button id="loginBtn" type="button">접속</button>
    </div>

    <div id="dashView" style="display:none;">
      <div class="stats" id="statsRow"></div>
      <div class="panel">
        <strong>회원 목록</strong>
        <div style="overflow-x:auto;margin-top:10px;">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>이메일</th>
                <th>이름</th>
                <th>가입일</th>
                <th>오늘 사용량</th>
                <th>누적</th>
                <th>결과물</th>
                <th>협업중</th>
              </tr>
            </thead>
            <tbody id="usersBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <script>
    const TOKEN_KEY = "nasaroai_admin_token";
    let adminToken = sessionStorage.getItem(TOKEN_KEY) || "";

    async function api(path, opts = {}) {
      const headers = { ...(opts.headers || {}) };
      if (adminToken) headers.Authorization = "Bearer " + adminToken;
      const res = await fetch(path, { ...opts, headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(typeof data.detail === "string" ? data.detail : "요청 실패");
      return data;
    }

    async function tryLogin() {
      const pw = document.getElementById("adminPassword").value;
      document.getElementById("loginErr").textContent = "";
      try {
        const data = await api("/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: pw }),
        });
        adminToken = data.token;
        sessionStorage.setItem(TOKEN_KEY, adminToken);
        await loadDashboard();
      } catch (e) {
        document.getElementById("loginErr").textContent = e.message || "로그인 실패";
      }
    }

    function fmtQuota(q) {
      if (!q) return "-";
      return Object.entries(q).map(([k, v]) => `${k}:${v}`).join(" ");
    }

    async function loadDashboard() {
      try {
        const data = await api("/admin/dashboard");
        document.getElementById("loginView").style.display = "none";
        document.getElementById("dashView").style.display = "";
        document.getElementById("logoutBtn").style.display = "";
        document.getElementById("statsRow").innerHTML = `
          <div class="stat"><b>${data.total_users}</b><span>전체 회원</span></div>
          <div class="stat"><b>${data.share_links}</b><span>공유 링크</span></div>
          <div class="stat"><b>${data.day_key}</b><span>오늘 (KST)</span></div>
          <div class="stat"><b>${fmtQuota(data.usage_today)}</b><span>전체 오늘 사용</span></div>`;
        const tbody = document.getElementById("usersBody");
        tbody.innerHTML = "";
        (data.users || []).forEach(u => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${u.id}</td>
            <td>${u.email}</td>
            <td>${u.display_name || "-"}</td>
            <td>${u.created_at_iso || "-"}</td>
            <td>${fmtQuota(u.quota_today)}</td>
            <td>${fmtQuota(u.quota_all_time)}</td>
            <td>${u.saved_results_count ?? 0}</td>
            <td>${u.has_active_collab ? "예" : "-"}</td>`;
          tbody.appendChild(tr);
        });
      } catch {
        adminToken = "";
        sessionStorage.removeItem(TOKEN_KEY);
        document.getElementById("loginView").style.display = "";
        document.getElementById("dashView").style.display = "none";
        document.getElementById("logoutBtn").style.display = "none";
      }
    }

    document.getElementById("loginBtn").addEventListener("click", tryLogin);
    document.getElementById("adminPassword").addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      try { await api("/admin/logout", { method: "POST" }); } catch {}
      adminToken = "";
      sessionStorage.removeItem(TOKEN_KEY);
      location.reload();
    });

    if (adminToken) loadDashboard();
  </script>
</body>
</html>
