<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>ArenaX 에이전트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #f6f7f9;
      color: #111827;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .panel-title { font-size: 15px; font-weight: 800; color: #111827; }

    #urlSettingToggle {
      font-size: 12px;
      color: #6b7280;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
    }

    .url-setting-area {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 14px;
      display: none;
    }

    .url-setting-area.open { display: block; }

    .url-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    #serverUrl {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
    }

    #saveServerBtn {
      padding: 7px 12px;
      background: #2563eb;
      color: #fff;
      border: 0;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    #statusBar {
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    #statusBar[data-type="idle"]    { background: #f9fafb; color: #6b7280; }
    #statusBar[data-type="loading"] { background: #eff6ff; color: #1d4ed8; }
    #statusBar[data-type="success"] { background: #ecfdf5; color: #047857; }
    #statusBar[data-type="error"]   { background: #fef2f2; color: #b91c1c; }
    #statusBar[data-type="handoff"] { background: #fffbeb; color: #b45309; }

    #historyArea {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .empty-msg {
      text-align: center;
      color: #9ca3af;
      font-size: 13px;
      line-height: 1.7;
      padding: 32px 12px;
      white-space: pre-line;
    }

    .agent-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-left: 4px solid #9ca3af;
      border-radius: 10px;
      overflow: hidden;
    }

    .agent-card.success { border-left-color: #7c3aed; }
    .agent-card.error   { border-left-color: #dc2626; background: #fef2f2; }
    .agent-card.loading { border-left-color: #3b82f6; opacity: 0.7; }
    .agent-card.handoff { border-left-color: #f59e0b; background: #fffbeb; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px 4px;
    }

    .card-task {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
      line-height: 1.4;
      word-break: break-word;
    }

    .card-badge {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 999px;
    }

    .card-badge.success { background: #ede9fe; color: #6d28d9; }
    .card-badge.error   { background: #fee2e2; color: #b91c1c; }
    .card-badge.loading { background: #dbeafe; color: #1d4ed8; }
    .card-badge.handoff { background: #fef3c7; color: #b45309; }

    .card-time {
      padding: 0 12px 4px;
      font-size: 11px;
      color: #9ca3af;
    }

    .card-body {
      padding: 0 12px 10px;
      font-size: 13px;
      line-height: 1.7;
      color: #374151;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
      flex-shrink: 0;
    }

    #taskInput {
      flex: 1;
      resize: none;
      overflow: hidden;
      min-height: 38px;
      max-height: 120px;
      padding: 9px 11px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      line-height: 1.5;
      color: #111827;
    }

    #taskInput:focus {
      outline: none;
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }

    #taskInput:disabled { background: #f3f4f6; color: #9ca3af; }

    #sendBtn {
      align-self: flex-end;
      flex-shrink: 0;
      background: #7c3aed;
      color: #fff;
      border: 0;
      border-radius: 10px;
      padding: 0 16px;
      height: 38px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    #sendBtn:hover:not(:disabled) { background: #6d28d9; }
    #sendBtn:disabled { background: #c4b5fd; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="panel-header">
    <div class="panel-title">🌐 ArenaX 에이전트</div>
    <button id="urlSettingToggle" type="button">서버 설정 ▼</button>
  </div>

  <div id="urlSettingArea" class="url-setting-area">
    <div class="url-row">
      <input id="serverUrl" type="url" placeholder="https://arenax-4812.onrender.com" value="https://arenax-4812.onrender.com" />
      <button id="saveServerBtn" type="button">저장</button>
    </div>
  </div>

  <div id="statusBar" data-type="idle">대기 중</div>

  <div id="historyArea">
    <div class="empty-msg">
      에이전트에게 웹 작업을 지시하세요.
      어떤 사이트에서든 이 패널에서 작업할 수 있습니다.
    </div>
  </div>

  <div class="input-area">
    <textarea id="taskInput" rows="1" placeholder="예: 구글에서 오늘 날씨 검색해줘"></textarea>
    <button id="sendBtn" type="button">전송</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
