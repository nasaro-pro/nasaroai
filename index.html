<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArenaX</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100dvh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
            background: #f6f7f9;
            color: #111827;
        }

        .app {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e5e7eb;
        }

        .header-inner {
            width: min(1160px, 100%);
            margin: 0 auto;
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .header-brand {
            text-align: center;
        }

        .header-brand h1 {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.2;
            letter-spacing: -0.03em;
        }

        .header-brand p {
            margin-top: 2px;
            font-size: 14px;
            color: #6b7280;
        }

        .mode-btn {
            border: 1px solid #e5e7eb;
            border-radius: 999px;
            background: transparent;
            color: #374151;
            padding: 8px 16px;
            min-height: 36px;
            font: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        .mode-btn.active {
            background: #2563eb;
            border-color: #2563eb;
            color: #fff;
        }

        .mode-btn:hover:not(.active):not(:disabled) {
            background: #f3f4f6;
        }

        main {
            width: min(1160px, 100%);
            margin: 0 auto;
            flex: 1;
            padding: 18px;
            padding-bottom: calc(var(--input-dock-height, 120px) + 32px);
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        /* 협업 초기 안내 화면 */
        .collab-intro {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 40dvh;
            text-align: center;
            gap: 12px;
            padding: 32px 16px;
        }

        .collab-intro-icon {
            font-size: 48px;
            line-height: 1;
        }

        .collab-intro-title {
            font-size: 22px;
            font-weight: 800;
            color: #111827;
        }

        .collab-intro-desc {
            font-size: 15px;
            color: #6b7280;
            line-height: 1.8;
        }

        /* 협업 워크스페이스 */
        .collab-workspace {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* AI 추천 결과 */
        .collab-recommend-result {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 15px;
            line-height: 1.75;
            color: #1e40af;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* 4개 사이드바 컨테이너: 화면 상단에 가로로 4등분 */
        .collab-sidebars {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            align-items: start;
        }

        .collab-sidebar {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px 10px;
        }

        .collab-sidebar-title {
            font-size: 11px;
            font-weight: 800;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
            padding: 0 4px;
            line-height: 1.5;
            min-height: 32px;
            display: flex;
            align-items: center;
        }

        .collab-ai-list {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .collab-ai-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            width: 100%;
            padding: 7px 8px;
            border: 1px solid transparent;
            border-radius: 7px;
            background: transparent;
            font: inherit;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            cursor: pointer;
            text-align: left;
            transition: background 0.12s, border-color 0.12s;
        }

        .collab-ai-btn:hover {
            background: #f3f4f6;
        }

        .collab-ai-btn.active {
            background: #eff6ff;
            border-color: #bfdbfe;
            color: #1d4ed8;
        }

        .collab-ai-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            flex: 0 0 8px;
        }

        @media (max-width: 900px) {
            .collab-sidebars {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 560px) {
            .collab-sidebars {
                grid-template-columns: 1fr;
            }
        }

        .notice {
            display: none;
            margin-bottom: 16px;
            border-radius: 6px;
            padding: 11px 12px;
            font-size: 15px;
            line-height: 1.6;
        }

        .notice.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .notice.info {
            background: #dbeafe;
            color: #1e40af;
        }

        .compare-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .compare-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-left: 4px solid #9ca3af;
            border-radius: 8px;
            overflow: hidden;
        }

        .compare-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 42px;
            padding: 10px 12px;
            border-bottom: 1px solid #f3f4f6;
            font-size: 15px;
            font-weight: 800;
        }

        .compare-model-meta {
            margin-left: auto;
            font-size: 11px;
            font-weight: 500;
            color: #9ca3af;
            max-width: 55%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: #9ca3af;
            flex: 0 0 auto;
        }

        .compare-content {
            min-height: 120px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            padding: 12px;
            font-size: 16px;
            line-height: 1.75;
        }

        .compare-card.error-card {
            border-left-color: #dc2626;
            background: #fef2f2;
        }

        .retry-row {
            padding: 0 12px 12px;
        }

        .retry-row:empty {
            padding: 0;
        }

        .retry-button {
            width: auto;
            min-height: 40px;
            padding: 10px 18px;
            background: #dc2626;
            color: #fff;
            font-size: 15px;
            border: 0;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
        }

        .retry-button:hover {
            background: #b91c1c;
        }

        .debate-stage {
            position: relative;
            overflow: hidden;
            min-height: 420px;
            margin-top: 14px;
        }

        .debate-card {
            position: absolute;
            top: 0;
            left: 50%;
            width: min(720px, 70%);
            margin-left: calc(min(720px, 70%) / -2);
            min-height: 320px;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-left: 5px solid #9ca3af;
            border-radius: 8px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
            transition: transform 300ms ease-out, opacity 300ms ease-out;
            overflow: hidden;
        }

        .debate-card.active {
            transform: translateX(0) scale(1);
            opacity: 1;
            z-index: 3;
        }

        .debate-card.preview-prev {
            transform: translateX(-82%) scale(0.9);
            opacity: 0.78;
            z-index: 2;
            cursor: pointer;
        }

        .debate-card.preview-next {
            transform: translateX(82%) scale(0.9);
            opacity: 0.78;
            z-index: 2;
            cursor: pointer;
        }

        .debate-card.hidden-left {
            transform: translateX(-130%) scale(0.85);
            opacity: 0;
            z-index: 0;
            pointer-events: none;
        }

        .debate-card.hidden-right {
            transform: translateX(130%) scale(0.85);
            opacity: 0;
            z-index: 0;
            pointer-events: none;
        }

        .debate-card.error-card {
            border-left-color: #dc2626;
            background: #fef2f2;
        }

        .debate-retry {
            padding: 0 14px 16px;
        }

        .debate-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            border-bottom: 1px solid #f3f4f6;
            font-size: 15px;
            font-weight: 800;
        }

        .debate-badge {
            margin-left: auto;
            border-radius: 4px;
            background: #f3f4f6;
            color: #6b7280;
            padding: 3px 7px;
            font-size: 12px;
            font-weight: 700;
        }

        .debug-toggle {
            margin-left: 6px;
            border: 0;
            background: transparent;
            color: #9ca3af;
            font-size: 18px;
            line-height: 1;
            padding: 2px 6px;
            min-height: auto;
            cursor: pointer;
            border-radius: 4px;
        }

        .debug-toggle:hover {
            background: #f3f4f6;
            color: #6b7280;
        }

        .debate-card-body {
            max-height: 260px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            padding: 14px;
            font-size: 16px;
            line-height: 1.75;
        }

        .debate-preview-body {
            padding: 14px;
            font-size: 15px;
            line-height: 1.6;
            color: #4b5563;
        }

        .debate-debug {
            display: none;
            padding: 0 14px 14px;
            color: #6b7280;
            font-size: 12px;
            line-height: 1.5;
            word-break: break-word;
        }

        .new-arrival {
            display: none;
            position: absolute;
            right: 18px;
            top: 12px;
            z-index: 5;
            border-radius: 999px;
            background: #f97316;
            color: #fff;
            padding: 5px 9px;
            font-size: 11px;
            font-weight: 800;
        }

        .new-arrival.visible {
            display: inline-block;
        }

        .deck-indicators {
            display: flex;
            justify-content: center;
            gap: 6px;
            min-height: 18px;
            margin-top: 8px;
        }

        .deck-dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: #d1d5db;
        }

        .deck-dot.active {
            background: #2563eb;
        }

        .input-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 200;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            border-top: 1px solid #e5e7eb;
            box-shadow: 0 -4px 24px rgba(15, 23, 42, 0.06);
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        .dock-inner {
            width: min(1160px, 100%);
            margin: 0 auto;
            padding: 12px 18px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .dock-mode-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        #mainInput {
            width: 100%;
            min-height: 44px;
            max-height: 168px;
            resize: none;
            overflow-y: auto;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 12px 14px;
            font: inherit;
            font-size: 16px;
            line-height: 1.5;
            color: #111827;
            background: #fff;
        }

        #mainInput:focus {
            outline: 2px solid #bfdbfe;
            border-color: #3b82f6;
        }

        .dock-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            flex-wrap: wrap;
        }

        .dock-btn {
            border: 0;
            border-radius: 8px;
            padding: 12px 22px;
            min-height: 44px;
            font: inherit;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .dock-btn:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .dock-btn.primary {
            background: #2563eb;
            color: #fff;
        }

        .dock-btn.secondary {
            background: #f97316;
            color: #fff;
        }

        .dock-btn.muted {
            background: #e5e7eb;
            color: #374151;
        }

        @media (min-width: 760px) {
            .compare-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (min-width: 1080px) {
            .compare-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            main {
                padding: 12px;
            }

            .debate-stage {
                min-height: 430px;
            }

            .debate-card {
                width: 84%;
                margin-left: -42%;
            }

            .debate-card.preview-prev {
                transform: translateX(-78%) scale(0.88);
            }

            .debate-card.preview-next {
                transform: translateX(78%) scale(0.88);
            }
        }

        /* ===== Agent Mode ===== */
        .agent-toggle-btn {
            border: 1px solid #c4b5fd;
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
            color: #5b21b6;
            box-shadow: 0 2px 8px rgba(91, 33, 182, 0.12);
        }

        .agent-toggle-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%);
        }

        .agent-toggle-btn.active {
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            color: #fff;
            border-color: #6d28d9;
        }

        .agent-panel {
            display: none;
            position: fixed;
            left: 50%;
            bottom: 80px;
            transform: translateX(-50%);
            z-index: 250;
            width: min(920px, calc(100vw - 24px));
            max-height: min(62dvh, 560px);
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(14px);
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
            overflow: hidden;
            flex-direction: column;
        }

        .agent-panel.visible {
            display: flex;
        }

        .agent-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid #f3f4f6;
            background: rgba(249, 250, 251, 0.9);
        }

        .agent-panel-title {
            font-size: 16px;
            font-weight: 800;
            color: #111827;
        }

        .agent-panel-close {
            border: 0;
            background: #f3f4f6;
            color: #374151;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
        }

        .agent-panel-close:hover {
            background: #e5e7eb;
        }

        .agent-status-bar {
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 700;
            border-bottom: 1px solid #f3f4f6;
        }

        .agent-status-bar[data-type="idle"] {
            background: #f9fafb;
            color: #6b7280;
        }

        .agent-status-bar[data-type="loading"] {
            background: #eff6ff;
            color: #1d4ed8;
        }

        .agent-status-bar[data-type="success"] {
            background: #ecfdf5;
            color: #047857;
        }

        .agent-status-bar[data-type="error"] {
            background: #fef2f2;
            color: #b91c1c;
        }

        .agent-history {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .agent-history::-webkit-scrollbar {
            width: 8px;
        }

        .agent-history::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 999px;
        }

        .agent-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-left: 4px solid #7c3aed;
            border-radius: 12px;
            overflow: hidden;
        }

        .agent-card.error-card {
            border-left-color: #dc2626;
            background: #fef2f2;
        }

        .agent-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            padding: 12px 14px 8px;
        }

        .agent-card-title {
            font-size: 14px;
            font-weight: 800;
            color: #111827;
            line-height: 1.4;
            word-break: break-word;
        }

        .agent-card-badge {
            flex: 0 0 auto;
            font-size: 11px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 999px;
            background: #ede9fe;
            color: #6d28d9;
        }

        .agent-card-badge.error {
            background: #fee2e2;
            color: #b91c1c;
        }

        .agent-card-meta {
            padding: 0 14px 8px;
            font-size: 12px;
            color: #9ca3af;
        }

        .agent-card-body {
            padding: 0 14px 12px;
            font-size: 14px;
            line-height: 1.7;
            color: #374151;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .agent-card-toggle {
            margin: 0 14px 12px;
            border: 0;
            background: #f3f4f6;
            color: #374151;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .agent-card-body.collapsed {
            display: none;
        }

        .agent-empty {
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
            line-height: 1.7;
            padding: 24px 12px;
        }

        @media (max-width: 640px) {
            .agent-panel {
                bottom: calc(var(--input-dock-height, 120px) + 12px);
                width: calc(100vw - 16px);
                max-height: 48dvh;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="site-header">
            <div class="header-inner">
                <div class="header-brand">
                    <h1>ArenaX</h1>
                    <p>AI 모델 비교·토론·협업 실험실</p>
                </div>
            </div>
        </header>

        <main id="mainContent">
            <section id="comparePanel" class="panel active">
                <div id="compareError" class="notice error"></div>
                <div id="compareLoading" class="notice info"></div>
                <div id="compareResponses" class="compare-grid"></div>
            </section>

            <section id="debatePanel" class="panel">
                <div id="debateError" class="notice error"></div>
                <div id="debateLoading" class="notice info"></div>
                <div id="debateContent">
                    <div id="debateStage" class="debate-stage" style="display:none;">
                        <span id="newArrival" class="new-arrival">새 답변 도착</span>
                    </div>
                    <div id="deckIndicators" class="deck-indicators"></div>
                </div>
            </section>

            <section id="collabPanel" class="panel">
                <div id="collabIntro" class="collab-intro">
                    <div class="collab-intro-icon">🤝</div>
                    <h2 class="collab-intro-title">어떤 작업을 원하십니까?</h2>
                    <p class="collab-intro-desc">
                        아래 입력창에 작업 내용을 입력하면<br>
                        각 단계에 맞는 AI를 추천해드립니다.
                    </p>
                </div>

                <div id="collabWorkspace" class="collab-workspace" style="display:none;">
                    <div id="collabRecommendResult" class="collab-recommend-result"></div>
                    <div class="collab-sidebars">
                        <div class="collab-sidebar" data-sidebar="1">
                            <div class="collab-sidebar-title">정보 조사 및<br>아이디어 생성 AI 선택</div>
                            <div class="collab-ai-list">
                                <button class="collab-ai-btn" data-ai="Perplexity" type="button"><span class="collab-ai-dot" style="background:#059669;"></span>Perplexity</button>
                                <button class="collab-ai-btn" data-ai="You.com" type="button"><span class="collab-ai-dot" style="background:#2563eb;"></span>You.com</button>
                                <button class="collab-ai-btn" data-ai="Exa AI" type="button"><span class="collab-ai-dot" style="background:#7c3aed;"></span>Exa AI</button>
                                <button class="collab-ai-btn" data-ai="Tavily" type="button"><span class="collab-ai-dot" style="background:#0891b2;"></span>Tavily</button>
                                <button class="collab-ai-btn" data-ai="Gemini" type="button"><span class="collab-ai-dot" style="background:#ca8a04;"></span>Gemini</button>
                                <button class="collab-ai-btn" data-ai="GPT-4o" type="button"><span class="collab-ai-dot" style="background:#2563eb;"></span>GPT-4o</button>
                                <button class="collab-ai-btn" data-ai="Claude" type="button"><span class="collab-ai-dot" style="background:#7c3aed;"></span>Claude</button>
                                <button class="collab-ai-btn" data-ai="Llama 4" type="button"><span class="collab-ai-dot" style="background:#0f766e;"></span>Llama 4</button>
                                <button class="collab-ai-btn" data-ai="DeepSeek R1" type="button"><span class="collab-ai-dot" style="background:#9333ea;"></span>DeepSeek R1</button>
                                <button class="collab-ai-btn" data-ai="Mistral" type="button"><span class="collab-ai-dot" style="background:#f59e0b;"></span>Mistral</button>
                            </div>
                        </div>
                        <div class="collab-sidebar" data-sidebar="2">

                <textarea id="mainInput" rows="1" placeholder="비교할 질문을 입력하세요…"></textarea>

                <button id="agentPanelClose" class="agent-panel-close" type="button" aria-label="에이전트 패널 닫기">×</button>

            <div id="agentHistory" class="agent-history">
                <div class="agent-empty">브라우저 에이전트에게 수행할 작업을 입력하세요.</div>
            </div>

    <script>
        const API_URL = "";
        const AI_COLORS = {
            OpenAI: "#2563eb",
            Anthropic: "#7c3aed",
            Google: "#ca8a04",
            xAI: "#dc2626",
            Perplexity: "#059669",
            DeepSeek: "#9333ea",
            meta: "#0f766e",
            qwen: "#0891b2",
            nvidia: "#65a30d",
            deepseek: "#9333ea",
            Unknown: "#6b7280",
        };
        const MODELS = ["OpenAI", "Anthropic", "Google", "xAI", "Perplexity", "DeepSeek"];

        const COMPARE_FAILURE_MSG = "이번 응답 생성에 실패했습니다. 다시 시도해주세요.";
        const DEBATE_FAILURE_MSG = "이번 발언 생성에 실패했습니다. 다시 시도해주세요.";

        let currentMode = "compare";
        let debateSessionId = createUUID();
        let debateTopic = "";
        let debateStarted = false;
        let debateInFlight = false;
        let queuedDuringFlight = false;
        let debateCards = [];
        let activeCardIndex = 0;
        let userMovedDeck = false;
        let touchStartX = 0;

        let lastCompareMessage = "";
        let lastCompareSessionId = "";
        let compareResponses = {};

        let collabTaskAsked = false;
        let collabRecommendInFlight = false;

        let isAgentMode = false;
        let agentInFlight = false;

        const mainInput = document.getElementById("mainInput");
        const dockPrimaryBtn = document.getElementById("dockPrimaryBtn");
        const dockSecondaryBtn = document.getElementById("dockSecondaryBtn");
        const dockNewDebateBtn = document.getElementById("dockNewDebateBtn");
        const agentToggleBtn = document.getElementById("agentToggleBtn");
        const agentPanel = document.getElementById("agentPanel");
        const agentPanelClose = document.getElementById("agentPanelClose");
        const agentStatusBar = document.getElementById("agentStatusBar");
        const agentHistory = document.getElementById("agentHistory");
        const inputDock = document.getElementById("inputDock");
        const mainContent = document.getElementById("mainContent");

        function createUUID() {
            if (crypto.randomUUID) return crypto.randomUUID();
            return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, char => {
                const random = Math.random() * 16 | 0;
                const value = char === "x" ? random : (random & 0x3) | 0x8;
                return value.toString(16);
            });
        }

        function showNotice(id, message) {
            const element = document.getElementById(id);
            element.textContent = message;
            element.style.display = message ? "block" : "none";
        }

        function colorFor(label) {
            return AI_COLORS[label] || AI_COLORS.Unknown;
        }

        function safeLabel(value, fallback = "Unknown") {
            return typeof value === "string" && value.trim() ? value : fallback;
        }

        function summarizeOneLine(text) {
            const clean = String(text || "").replace(/\s+/g, " ").trim();
            return clean.length > 64 ? `${clean.slice(0, 64)}...` : clean || "답변 작성 중...";
        }

        function syncMainPadding() {
            const height = inputDock.offsetHeight;
            document.documentElement.style.setProperty("--input-dock-height", `${height}px`);
            mainContent.style.paddingBottom = `${height + 32}px`;
        }

        function autoResizeInput() {
            mainInput.style.height = "auto";
            const lineHeight = 24;
            const maxHeight = lineHeight * 6 + 24;
            mainInput.style.height = `${Math.min(mainInput.scrollHeight, maxHeight)}px`;
            syncMainPadding();
        }

        function updateDockUI() {
            dockSecondaryBtn.style.display = "none";
            dockNewDebateBtn.style.display = "none";

            if (isAgentMode) {
                agentToggleBtn.classList.add("active");
                mainInput.placeholder = agentInFlight
                    ? "작업 진행 중..."
                    : "브라우저 에이전트에게 명령을 입력하세요…";
                dockPrimaryBtn.textContent = agentInFlight ? "작업 중..." : "작업 실행 ▶";
                dockPrimaryBtn.className = "dock-btn primary";
                dockPrimaryBtn.disabled = agentInFlight;
                mainInput.disabled = agentInFlight;
                return;
            }

            agentToggleBtn.classList.remove("active");

            if (currentMode === "compare") {
                mainInput.placeholder = "비교할 질문을 입력하세요…";
                dockPrimaryBtn.textContent = "비교 시작 ▶";
                dockPrimaryBtn.className = "dock-btn primary";
                dockPrimaryBtn.disabled = false;
                mainInput.disabled = false;
                return;
            }

            if (currentMode === "collab") {
                mainInput.placeholder = collabTaskAsked
                    ? "추가 질문이나 수정 사항을 입력하세요…"
                    : "어떤 작업을 원하십니까?";
                dockPrimaryBtn.textContent = collabRecommendInFlight ? "분석 중..." : "AI 추천 받기 ▶";
                dockPrimaryBtn.className = "dock-btn primary";
                dockPrimaryBtn.disabled = collabRecommendInFlight;
                mainInput.disabled = false;
                return;
            }

            mainInput.disabled = false;
            if (!debateStarted) {
                mainInput.placeholder = "토론 주제를 입력하세요…";
                dockPrimaryBtn.textContent = "토론 시작 ▶";
                dockPrimaryBtn.className = "dock-btn secondary";
                dockPrimaryBtn.disabled = debateInFlight;
            } else {
                mainInput.placeholder = "새 질문이나 의견을 입력하세요…";
                dockPrimaryBtn.textContent = "다음 라운드 ▶";
                dockPrimaryBtn.className = "dock-btn primary";
                dockPrimaryBtn.disabled = debateInFlight;
                dockSecondaryBtn.style.display = "inline-block";
                dockSecondaryBtn.disabled = debateInFlight;
                dockNewDebateBtn.style.display = "inline-block";
                dockNewDebateBtn.disabled = debateInFlight;
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll(".mode-btn").forEach(btn => {
                btn.classList.toggle("active", btn.dataset.mode === mode);
            });
            document.querySelectorAll(".panel").forEach(panel => panel.classList.remove("active"));
            document.getElementById(`${mode}Panel`).classList.add("active");

            if (mode === "collab") {
                if (!collabTaskAsked) {
                    document.getElementById("collabIntro").style.display = "flex";
                    document.getElementById("collabWorkspace").style.display = "none";
                } else {
                    document.getElementById("collabIntro").style.display = "none";
                    document.getElementById("collabWorkspace").style.display = "flex";
                }
            }

            updateDockUI();
        }

        document.querySelectorAll(".mode-btn").forEach(btn => {
            btn.addEventListener("click", () => switchMode(btn.dataset.mode));
        });

        mainInput.addEventListener("input", autoResizeInput);
        mainInput.addEventListener("keydown", event => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                if (isAgentMode) {
                    sendAgentTask();
                    return;
                }
                dockPrimaryBtn.click();
            }
        });
        new ResizeObserver(syncMainPadding).observe(inputDock);
        window.addEventListener("resize", syncMainPadding);
        autoResizeInput();

        function lockMainInput(isLocked) {
            mainInput.disabled = isLocked;
            dockPrimaryBtn.disabled = isLocked;
        }

        function setAgentStatus(text, type = "idle") {
            agentStatusBar.textContent = text;
            agentStatusBar.dataset.type = type;
        }

        function toggleAgentMode(forceState = null) {
            isAgentMode = forceState !== null ? forceState : !isAgentMode;
            agentPanel.classList.toggle("visible", isAgentMode);
            if (isAgentMode) {
                if (!agentInFlight) {
                    setAgentStatus("대기 중", "idle");
                }
            } else if (agentInFlight) {
                setAgentStatus("작업은 백그라운드에서 계속됩니다 (패널 닫힘)", "loading");
            }
            updateDockUI();
        }

        function renderAgentCard(data) {
            const empty = agentHistory.querySelector(".agent-empty");
            if (empty) empty.remove();

            const card = document.createElement("article");
            card.className = "agent-card" + (data.status === "error" ? " error-card" : "");
            const isSuccess = data.status === "success";
            const summary = isSuccess
                ? (data.result || "결과 없음")
                : (data.message || "알 수 없는 오류");
            const preview = summary.length > 220 ? `${summary.slice(0, 220)}...` : summary;

            card.innerHTML = `
                <div class="agent-card-header">
                    <div class="agent-card-title">${escapeHtml(data.query)}</div>
                    <span class="agent-card-badge${isSuccess ? "" : " error"}">${isSuccess ? "완료" : "실패"}</span>
                </div>
                <div class="agent-card-meta">${escapeHtml(data.timestamp)}</div>
                <div class="agent-card-body collapsed">${escapeHtml(preview)}</div>
                <button class="agent-card-toggle" type="button">결과 펼치기</button>
            `;

            const body = card.querySelector(".agent-card-body");
            body.dataset.full = summary;
            body.textContent = preview;

            const toggle = card.querySelector(".agent-card-toggle");
            toggle.addEventListener("click", () => {
                const collapsed = body.classList.toggle("collapsed");
                if (!collapsed) {
                    body.textContent = body.dataset.full;
                } else {
                    body.textContent = preview;
                }
                toggle.textContent = collapsed ? "결과 펼치기" : "결과 접기";
            });

            agentHistory.prepend(card);
            agentHistory.scrollTop = 0;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        async function sendAgentTask() {
            const query = mainInput.value.trim();
            if (!query || agentInFlight || !isAgentMode) return;

            agentInFlight = true;
            lockMainInput(true);
            setAgentStatus("⏳ 브라우저 탐색 및 작업 중...", "loading");
            mainInput.value = "";
            autoResizeInput();

            const timestamp = new Date().toLocaleString("ko-KR");
            try {
                const response = await fetch(`${API_URL}/agent/task`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query }),
                });

                let data = {};
                try {
                    data = await response.json();
                } catch (parseError) {
                    throw new Error("서버 응답을 해석하지 못했습니다.");
                }

                if (!response.ok || data.status === "error") {
                    const message = data.message || data.detail?.message || `서버 오류 (${response.status})`;
                    renderAgentCard({ query, status: "error", message, timestamp });
                    setAgentStatus("❌ 실패", "error");
                    return;
                }

                renderAgentCard({
                    query,
                    status: "success",
                    result: data.result || "",
                    timestamp,
                });
                setAgentStatus("✅ 완료", "success");
            } catch (error) {
                renderAgentCard({
                    query,
                    status: "error",
                    message: error.message || "네트워크 오류",
                    timestamp,
                });
                setAgentStatus("❌ 실패", "error");
            } finally {
                agentInFlight = false;
                updateDockUI();
            }
        }

        agentToggleBtn.addEventListener("click", () => toggleAgentMode());
        agentPanelClose.addEventListener("click", () => toggleAgentMode(false));

        dockPrimaryBtn.addEventListener("click", () => {
            if (isAgentMode) {
                sendAgentTask();
                return;
            }
            if (currentMode === "compare") handleCompare();
            else if (currentMode === "debate") {
                if (!debateStarted) handleDebateStart();
                else handleDebateContinue();
            } else if (currentMode === "collab") handleCollabSubmit();
        });

        async function handleCollabSubmit() {
            const task = mainInput.value.trim();
            if (!task || collabRecommendInFlight) return;

            collabRecommendInFlight = true;
            dockPrimaryBtn.disabled = true;
            mainInput.value = "";
            autoResizeInput();

            const resultEl = document.getElementById("collabRecommendResult");
            const workspaceEl = document.getElementById("collabWorkspace");
            const introEl = document.getElementById("collabIntro");

            resultEl.textContent = "추천 AI를 분석하는 중입니다...";
            workspaceEl.style.display = "flex";
            introEl.style.display = "none";

            try {
                const response = await fetch(`${API_URL}/collab/recommend`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ task }),
                });
                if (!response.ok) throw new Error(`서버 오류 (${response.status})`);
                const data = await response.json();
                resultEl.textContent = data.recommendation || "추천 결과가 없습니다.";
            } catch (err) {
                resultEl.textContent = `오류: ${err.message}`;
            } finally {
                collabRecommendInFlight = false;
                collabTaskAsked = true;
                updateDockUI();
            }
        }

        dockSecondaryBtn.addEventListener("click", handleAddUserInput);
        dockNewDebateBtn.addEventListener("click", handleNewDebate);

        function handleNewDebate() {
            debateSessionId = createUUID();
            debateTopic = "";
            debateStarted = false;
            debateInFlight = false;
            queuedDuringFlight = false;
            debateCards = [];
            activeCardIndex = 0;
            userMovedDeck = false;
            mainInput.value = "";
            autoResizeInput();
            document.getElementById("debateStage").style.display = "none";
            document.getElementById("deckIndicators").innerHTML = "";
            showNotice("debateError", "");
            showNotice("debateLoading", "");
            updateDockUI();
        }

        document.querySelectorAll(".collab-ai-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                btn.classList.toggle("active");
            });
        });

        function renderCompareCard(model) {
            const color = colorFor(model);
            const card = document.createElement("article");
            card.className = "compare-card";
            card.id = `response-${model}`;
            card.style.borderLeftColor = color;
            card.innerHTML = `
                <div class="compare-card-header" style="color: ${color};">
                    <span class="dot" style="background: ${color};"></span>
                    <span>${model}</span>
                    <span class="compare-model-meta" id="model-meta-${model}"></span>
                </div>
                <div id="content-${model}" class="compare-content"></div>
                <div id="retry-${model}" class="retry-row"></div>
            `;
            document.getElementById("compareResponses").appendChild(card);
        }

        function updateCompareModelMeta(model, actualModel) {
            const meta = document.getElementById(`model-meta-${model}`);
            if (meta && actualModel) meta.textContent = actualModel;
        }

        function updateCompareCard(model, content, isError = false) {
            const element = document.getElementById(`content-${model}`);
            if (element) element.textContent = content;

            const card = document.getElementById(`response-${model}`);
            if (card) card.classList.toggle("error-card", isError);

            const retry = document.getElementById(`retry-${model}`);
            if (!retry) return;
            if (isError) {
                retry.innerHTML = `<button class="retry-button" type="button">다시 시도</button>`;
                retry.querySelector("button").addEventListener("click", () => retryCompareModel(model));
            } else {
                retry.innerHTML = "";
            }
        }

        function applyStreamChunk(responses, payload) {
            const model = safeLabel(payload.model, "");
            if (!model) return;

            if (payload.success === false || payload.error) {
                responses[model] = payload.error || COMPARE_FAILURE_MSG;
                updateCompareCard(model, responses[model], true);
            } else if (payload.chunk) {
                responses[model] += payload.chunk;
                updateCompareCard(model, responses[model]);
                if (payload.actual_model) {
                    updateCompareModelMeta(model, payload.actual_model);
                }
            }
        }

        async function retryCompareModel(model) {
            if (!lastCompareMessage) return;
            compareResponses[model] = "";
            updateCompareModelMeta(model, "");
            updateCompareCard(model, "다시 시도 중...");
            try {
                await streamCompareModel(model, lastCompareMessage, compareResponses, lastCompareSessionId);
            } catch (error) {
                applyStreamChunk(compareResponses, { model, success: false, error: COMPARE_FAILURE_MSG });
            }
        }

        async function streamCompareModel(model, message, responses, compareSessionId) {
            const response = await fetch(`${API_URL}/compare/stream`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message,
                    model_name: model,
                    compare_session_id: compareSessionId,
                }),
            });

            if (!response.ok || !response.body) {
                applyStreamChunk(responses, { model, success: false, error: COMPARE_FAILURE_MSG });
                return;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const events = buffer.split("\n\n");
                buffer = events.pop() || "";

                for (const event of events) {
                    const line = event.split("\n").find(item => item.startsWith("data: "));
                    if (!line) continue;

                    try {
                        applyStreamChunk(responses, JSON.parse(line.slice(6)));
                    } catch (error) {
                        applyStreamChunk(responses, { model, success: false, error: COMPARE_FAILURE_MSG });
                    }
                }
            }
        }

        async function handleCompare() {
            const message = mainInput.value.trim();
            if (!message) return;

            const responsesElement = document.getElementById("compareResponses");
            lastCompareMessage = message;
            lastCompareSessionId = createUUID();
            compareResponses = {};
            const responses = compareResponses;

            dockPrimaryBtn.disabled = true;
            showNotice("compareError", "");
            showNotice("compareLoading", "AI 모델들이 동시에 답변을 생성하는 중입니다.");
            responsesElement.innerHTML = "";

            MODELS.forEach(model => {
                responses[model] = "";
                renderCompareCard(model);
            });

            const STAGGER_MS = 500;
            const failures = [];
            await Promise.all(MODELS.map((model, index) =>
                new Promise(resolve => setTimeout(resolve, index * STAGGER_MS))
                    .then(() => streamCompareModel(model, message, responses, lastCompareSessionId))
                    .catch(error => {
                        failures.push(`${model}: ${error.message}`);
                        applyStreamChunk(responses, { model, success: false, error: COMPARE_FAILURE_MSG });
                    })
            ));

            if (failures.length > 0) {
                showNotice("compareError", `일부 모델 오류: ${failures.join(", ")}`);
            }

            showNotice("compareLoading", "");
            dockPrimaryBtn.disabled = false;
        }

        function appendLoadingCard(roundNumber, speakerIndex) {
            debateCards.push({
                id: `loading-${roundNumber}-${speakerIndex}-${Date.now()}`,
                loading: true,
                round_number: roundNumber,
                speaker_index: speakerIndex,
                model: `${speakerIndex}번`,
                role: speakerIndex === 1 ? "1번 주장" : speakerIndex === 2 ? "2번 반박" : "3번 종합",
                content: "답변 작성 중...",
            });
            if (!userMovedDeck && speakerIndex === 1) activeCardIndex = debateCards.length - 1;
            renderDebateDeck();
        }

        function replaceLoadingCards(roundNumber, turns) {
            turns.forEach(turn => {
                debateCards = debateCards.filter(card => !(
                    card.round_number === roundNumber &&
                    card.speaker_index === turn.speaker_index
                ));
                debateCards.push({
                    ...turn,
                    id: `${turn.round_number}-${turn.speaker_index}-${turn.actual_model || turn.model}`,
                    loading: false,
                });
            });

            const hasFirstSpeaker = turns.some(turn => turn.speaker_index === 1);
            if (!userMovedDeck && hasFirstSpeaker) {
                activeCardIndex = Math.max(0, debateCards.length - 1);
            } else if (activeCardIndex < debateCards.length - 1) {
                document.getElementById("newArrival").classList.add("visible");
            }
            renderDebateDeck();
        }

        function renderDebateDeck() {
            const stage = document.getElementById("debateStage");
            const indicator = document.getElementById("deckIndicators");
            stage.style.display = debateCards.length ? "block" : "none";
            stage.querySelectorAll(".debate-card").forEach(card => card.remove());

            debateCards.forEach((card, index) => {
                const label = safeLabel(card.model || card.actual_label);
                const color = colorFor(label);
                const isFailed = card.success === false && !card.loading;
                const element = document.createElement("article");
                element.className = "debate-card";
                element.style.borderLeftColor = isFailed ? "#dc2626" : color;
                if (isFailed) element.classList.add("error-card");

                if (index === activeCardIndex) {
                    element.classList.add("active");
                } else if (index === activeCardIndex - 1) {
                    element.classList.add("preview-prev");
                    element.addEventListener("click", retreatDeck);
                } else if (index === activeCardIndex + 1) {
                    element.classList.add("preview-next");
                    element.addEventListener("click", advanceDeck);
                } else if (index < activeCardIndex) {
                    element.classList.add("hidden-left");
                } else {
                    element.classList.add("hidden-right");
                }

                const isActive = index === activeCardIndex;
                const body = isActive ? card.content : summarizeOneLine(card.content);
                const debugId = `debug-${card.id}`;
                element.innerHTML = `
                    <div class="debate-card-header" style="color: ${isFailed ? "#dc2626" : color};">
                        <span class="dot" style="background: ${isFailed ? "#dc2626" : color};"></span>
                        <span>${card.round_number || "-"}라운드 · ${label}</span>
                        ${isActive && !isFailed && !card.loading ? `<button class="debug-toggle" type="button" aria-label="디버그 정보">···</button>` : ""}
                        <span class="debate-badge">${card.role || "발언"}</span>
                    </div>
                    <div class="${isActive ? "debate-card-body" : "debate-preview-body"}"></div>
                    ${isActive && isFailed ? `<div class="debate-retry"><button class="retry-button" type="button">다시 시도</button></div>` : ""}
                    ${isActive && !isFailed && !card.loading ? `
                        <div class="debate-debug" id="${debugId}">
                            요청: ${card.requested_label || "-"} / 실제: ${card.actual_label || label}<br>
                            요청 모델: ${card.requested_model || "-"}<br>
                            실제 모델: ${card.actual_model || "-"}<br>
                            실제 회사 모델: ${card.is_real_company_model ? "예" : "아니오"}
                        </div>
                    ` : ""}
                `;
                element.querySelector(isActive ? ".debate-card-body" : ".debate-preview-body").textContent = body;

                if (isActive && isFailed) {
                    element.querySelector(".retry-button").addEventListener("click", event => {
                        event.stopPropagation();
                        retryDebateSpeaker(card.round_number, card.speaker_index);
                    });
                }

                if (isActive && !isFailed && !card.loading) {
                    const toggle = element.querySelector(".debug-toggle");
                    const debug = element.querySelector(`#${CSS.escape(debugId)}`);
                    if (toggle && debug) {
                        toggle.addEventListener("click", event => {
                            event.stopPropagation();
                            debug.style.display = debug.style.display === "block" ? "none" : "block";
                        });
                    }
                }

                element.addEventListener("touchstart", event => {
                    touchStartX = event.touches[0].clientX;
                }, { passive: true });

                element.addEventListener("touchend", event => {
                    const touchEndX = event.changedTouches[0].clientX;
                    const delta = touchStartX - touchEndX;
                    if (delta > 45) advanceDeck();
                    else if (delta < -45) retreatDeck();
                }, { passive: true });

                stage.appendChild(element);
            });

            indicator.innerHTML = debateCards.map((_, index) => {
                const active = index === activeCardIndex ? " active" : "";
                return `<span class="deck-dot${active}"></span>`;
            }).join("");
        }

        function advanceDeck() {
            if (activeCardIndex >= debateCards.length - 1) return;
            activeCardIndex += 1;
            userMovedDeck = true;
            document.getElementById("newArrival").classList.remove("visible");
            renderDebateDeck();
        }

        function retreatDeck() {
            if (activeCardIndex <= 0) return;
            activeCardIndex -= 1;
            userMovedDeck = true;
            document.getElementById("newArrival").classList.remove("visible");
            renderDebateDeck();
        }

        async function requestDebate(endpoint, payload, options = {}) {
            debateInFlight = true;
            updateDockUI();
            showNotice("debateError", "");
            showNotice("debateLoading", options.loadingText || "토론 라운드를 순차 생성하는 중입니다.");

            const expectedRound = options.expectedRound || 1;
            const expectedSpeaker = options.expectedSpeaker || 1;
            if (options.showLoadingCard) appendLoadingCard(expectedRound, expectedSpeaker);

            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });

                if (!response.ok) throw new Error(`요청 실패 (${response.status})`);

                const data = await response.json();
                if (data.queued) {
                    queuedDuringFlight = true;
                    showNotice("debateLoading", "현재 라운드 진행 중, 다음 라운드에 반영됩니다.");
                    return data;
                }

                replaceLoadingCards(data.round || expectedRound, data.turns || []);
                return data;
            } catch (error) {
                showNotice("debateError", `오류: ${error.message}`);
                replaceLoadingCards(expectedRound, [{
                    round_number: expectedRound,
                    speaker_index: expectedSpeaker,
                    model: `${expectedSpeaker}번`,
                    role: expectedSpeaker === 1 ? "1번 주장" : expectedSpeaker === 2 ? "2번 반박" : "3번 종합",
                    content: DEBATE_FAILURE_MSG,
                    success: false,
                }]);
                return { round: expectedRound, turns: [{ success: false }] };
            } finally {
                debateInFlight = false;
                showNotice("debateLoading", "");
                updateDockUI();
            }
        }

        async function handleDebateStart() {
            const topic = mainInput.value.trim();
            if (!topic || debateInFlight) return;

            debateSessionId = createUUID();
            debateTopic = topic;
            debateStarted = true;
            debateCards = [];
            activeCardIndex = 0;
            userMovedDeck = false;
            queuedDuringFlight = false;
            mainInput.value = "";
            autoResizeInput();
            updateDockUI();

            await runDebateRoundSequence("/debate/start", {
                session_id: debateSessionId,
                topic: debateTopic,
            }, 1);
        }

        async function runDebateRoundSequence(firstEndpoint, firstPayload, expectedRound) {
            for (let speakerIndex = 1; speakerIndex <= 3; speakerIndex += 1) {
                const endpoint = speakerIndex === 1 ? firstEndpoint : "/debate/continue";
                const payload = speakerIndex === 1
                    ? firstPayload
                    : { session_id: debateSessionId, topic: debateTopic };
                const data = await requestDebate(endpoint, payload, {
                    expectedRound,
                    expectedSpeaker: speakerIndex,
                    showLoadingCard: true,
                    loadingText: `${speakerIndex}번 발언자를 생성하는 중입니다.`,
                });
                if (!data || data.queued) break;
            }

            if (queuedDuringFlight && !debateInFlight) {
                queuedDuringFlight = false;
                await handleDebateContinue();
            }
        }

        async function retryDebateSpeaker(roundNumber, speakerIndex) {
            if (debateInFlight) return;

            const index = debateCards.findIndex(card =>
                card.round_number === roundNumber && card.speaker_index === speakerIndex);
            if (index !== -1) {
                debateCards[index] = {
                    id: `loading-${roundNumber}-${speakerIndex}-${Date.now()}`,
                    loading: true,
                    round_number: roundNumber,
                    speaker_index: speakerIndex,
                    model: `${speakerIndex}번`,
                    role: speakerIndex === 1 ? "1번 주장" : speakerIndex === 2 ? "2번 반박" : "3번 종합",
                    content: "다시 시도하는 중...",
                };
                renderDebateDeck();
            }

            await requestDebate("/debate/continue", {
                session_id: debateSessionId,
                topic: debateTopic,
                retry_speaker_index: speakerIndex,
            }, {
                expectedRound: roundNumber,
                expectedSpeaker: speakerIndex,
                showLoadingCard: false,
                loadingText: `${speakerIndex}번 발언자를 다시 생성하는 중입니다.`,
            });
        }

        async function handleDebateContinue(userInput = null) {
            if (!debateStarted || debateInFlight) return;
            const nextRound = Math.max(0, ...debateCards.map(card => card.round_number || 0)) + 1;
            await runDebateRoundSequence("/debate/continue", {
                session_id: debateSessionId,
                topic: debateTopic,
                user_input: userInput,
            }, nextRound);
        }

        async function handleAddUserInput() {
            if (!debateStarted) return;
            const userInput = mainInput.value.trim();
            if (!userInput) return;
            mainInput.value = "";
            autoResizeInput();

            if (debateInFlight) {
                dockSecondaryBtn.disabled = true;
                try {
                    const response = await fetch(`${API_URL}/debate/continue`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            session_id: debateSessionId,
                            topic: debateTopic,
                            user_input: userInput,
                        }),
                    });
                    if (!response.ok) throw new Error(`큐잉 실패 (${response.status})`);
                    const data = await response.json();
                    if (data.queued) {
                        queuedDuringFlight = true;
                        showNotice("debateLoading", "현재 라운드 진행 중, 다음 라운드에 반영됩니다.");
                    } else if (data.turns && data.turns.length) {
                        replaceLoadingCards(data.round, data.turns);
                    }
                } catch (error) {
                    showNotice("debateError", `오류: ${error.message}`);
                } finally {
                    setTimeout(updateDockUI, 800);
                }
                return;
            }

            await handleDebateContinue(userInput);
        }

        updateDockUI();
    </script>
