<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArenaX</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
            background: #f6f7f9;
            color: #1f2937;
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #111827;
            color: #fff;
            padding: 18px 20px;
            border-bottom: 1px solid #374151;
        }

        header h1 {
            font-size: 22px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        header p {
            margin-top: 4px;
            color: #cbd5e1;
            font-size: 13px;
        }

        .tabs {
            display: flex;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
        }

        .tab {
            flex: 1;
            min-height: 44px;
            border: 0;
            border-bottom: 3px solid transparent;
            background: transparent;
            color: #6b7280;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .tab.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }

        main {
            width: min(1160px, 100%);
            margin: 0 auto;
            flex: 1;
            padding: 18px;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .composer {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 16px;
        }

        textarea {
            width: 100%;
            min-height: 96px;
            resize: vertical;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 12px;
            font: inherit;
            font-size: 14px;
            line-height: 1.5;
            color: #111827;
        }

        textarea:focus {
            outline: 2px solid #bfdbfe;
            border-color: #3b82f6;
        }

        .button-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        button {
            border: 0;
            border-radius: 6px;
            padding: 11px 14px;
            font: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .primary {
            background: #2563eb;
            color: #fff;
        }

        .secondary {
            background: #f97316;
            color: #fff;
        }

        .muted {
            background: #e5e7eb;
            color: #374151;
        }

        .notice {
            display: none;
            margin-bottom: 16px;
            border-radius: 6px;
            padding: 11px 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        .notice.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .notice.info {
            background: #dbeafe;
            color: #1e40af;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .card,
        .turn {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-left: 4px solid #9ca3af;
            border-radius: 8px;
            overflow: hidden;
        }

        .card-header,
        .turn-header {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 42px;
            padding: 10px 12px;
            border-bottom: 1px solid #f3f4f6;
            font-size: 13px;
            font-weight: 800;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: #9ca3af;
            flex: 0 0 auto;
        }

        .badge {
            margin-left: auto;
            border-radius: 4px;
            background: #f3f4f6;
            color: #6b7280;
            padding: 3px 7px;
            font-size: 11px;
            font-weight: 700;
        }

        .content {
            min-height: 120px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            padding: 12px;
            font-size: 13px;
            line-height: 1.65;
        }

        .turn {
            margin-bottom: 12px;
        }

        .turn .content {
            max-height: none;
        }

        .debug {
            padding: 0 12px 12px;
            color: #6b7280;
            font-size: 11px;
            line-height: 1.5;
            word-break: break-word;
        }

        @media (min-width: 760px) {
            .grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (min-width: 1080px) {
            .grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <h1>ArenaX</h1>
            <p>AI 모델 비교와 토론 실험실</p>
        </header>

        <div class="tabs">
            <button class="tab active" type="button" data-tab="compare">AI 비교</button>
            <button class="tab" type="button" data-tab="debate">AI 토론</button>
        </div>

        <main>
            <section id="comparePanel" class="panel active">
                <div class="composer">
                    <textarea id="compareInput" placeholder="비교할 질문을 입력하세요."></textarea>
                    <div class="button-row">
                        <button id="compareButton" class="primary" type="button">비교 시작</button>
                    </div>
                </div>
                <div id="compareError" class="notice error"></div>
                <div id="compareLoading" class="notice info"></div>
                <div id="compareResponses" class="grid"></div>
            </section>

            <section id="debatePanel" class="panel">
                <div id="debateComposer" class="composer">
                    <textarea id="debateInput" placeholder="토론 주제를 입력하세요."></textarea>
                    <div class="button-row">
                        <button id="debateStartButton" class="secondary" type="button">토론 시작</button>
                    </div>
                </div>
                <div id="debateError" class="notice error"></div>
                <div id="debateLoading" class="notice info"></div>
                <div id="debateContent"></div>
            </section>
        </main>
    </div>

    <script>
        const API_URL = "";
        const AI_COLORS = {
            OpenAI: "#2563eb",
            Anthropic: "#7c3aed",
            Google: "#ca8a04",
            xAI: "#dc2626",
            Perplexity: "#059669",
        };
        const MODELS = Object.keys(AI_COLORS);

        let debateSessionId = crypto.randomUUID ? crypto.randomUUID() : generateUUID();
        let debateTopic = "";
        let debateRound = 0;

        function generateUUID() {
            return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, char => {
                const random = Math.random() * 16 | 0;
                const value = char === "x" ? random : (random & 0x3) | 0x8;
                return value.toString(16);
            });
        }

        function showNotice(id, message) {
            const element = document.getElementById(id);
            element.textContent = message;
            element.style.display = message ? "block" : "none";
        }

        function colorFor(label) {
            return AI_COLORS[label] || "#6b7280";
        }

        function safeLabel(value, fallback = "Unknown") {
            return typeof value === "string" && value.trim() ? value : fallback;
        }

        document.querySelectorAll(".tab").forEach(tab => {
            tab.addEventListener("click", () => {
                document.querySelectorAll(".tab").forEach(item => item.classList.remove("active"));
                document.querySelectorAll(".panel").forEach(item => item.classList.remove("active"));
                tab.classList.add("active");
                document.getElementById(`${tab.dataset.tab}Panel`).classList.add("active");
            });
        });

        document.getElementById("compareButton").addEventListener("click", handleCompare);
        document.getElementById("debateStartButton").addEventListener("click", handleDebateStart);

        function renderResponseCard(model) {
            const color = colorFor(model);
            const card = document.createElement("article");
            card.className = "card";
            card.id = `response-${model}`;
            card.style.borderLeftColor = color;
            card.innerHTML = `
                <div class="card-header" style="color: ${color};">
                    <span class="dot" style="background: ${color};"></span>
                    <span>${model}</span>
                </div>
                <div id="content-${model}" class="content"></div>
            `;
            document.getElementById("compareResponses").appendChild(card);
        }

        function updateResponseCard(model, content) {
            const element = document.getElementById(`content-${model}`);
            if (element) element.textContent = content;
        }

        function applyStreamChunk(responses, payload) {
            const model = safeLabel(payload.model, "");
            if (!model) return;

            if (payload.error) {
                responses[model] = payload.error;
            } else if (payload.chunk) {
                responses[model] += payload.chunk;
            }
            updateResponseCard(model, responses[model]);
        }

        async function streamCompareModel(model, message, responses) {
            const response = await fetch(`${API_URL}/compare/stream`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message, model_name: model }),
            });

            if (!response.ok || !response.body) {
                applyStreamChunk(responses, { model, error: `[API 오류 ${response.status}]` });
                return;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const events = buffer.split("\n\n");
                buffer = events.pop() || "";

                for (const event of events) {
                    const line = event.split("\n").find(item => item.startsWith("data: "));
                    if (!line) continue;

                    try {
                        applyStreamChunk(responses, JSON.parse(line.slice(6)));
                    } catch (error) {
                        applyStreamChunk(responses, { model, error: "[API 오류 JSON 파싱 실패]" });
                    }
                }
            }
        }

        async function handleCompare() {
            const message = document.getElementById("compareInput").value.trim();
            if (!message) return;

            const button = document.getElementById("compareButton");
            const responsesElement = document.getElementById("compareResponses");
            const responses = {};

            button.disabled = true;
            showNotice("compareError", "");
            showNotice("compareLoading", "AI 모델들이 답변을 생성하는 중입니다.");
            responsesElement.innerHTML = "";

            MODELS.forEach(model => {
                responses[model] = "";
                renderResponseCard(model);
            });

            const failures = [];
            for (const model of MODELS) {
                try {
                    await streamCompareModel(model, message, responses);
                } catch (error) {
                    failures.push(`${model}: ${error.message}`);
                    applyStreamChunk(responses, { model, error: "[API 오류 네트워크 실패]" });
                }
            }

            if (failures.length > 0) {
                showNotice("compareError", `일부 모델 오류: ${failures.join(", ")}`);
            }

            showNotice("compareLoading", "");
            button.disabled = false;
        }

        async function handleDebateStart() {
            const topic = document.getElementById("debateInput").value.trim();
            if (!topic) return;

            debateTopic = topic;
            debateRound = 1;

            document.getElementById("debateStartButton").disabled = true;
            document.getElementById("debateContent").innerHTML = "";
            document.getElementById("debateComposer").style.display = "none";
            showNotice("debateError", "");
            showNotice("debateLoading", "AI 모델들이 토론을 준비하는 중입니다.");

            try {
                const response = await fetch(`${API_URL}/debate/start`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ session_id: debateSessionId, topic }),
                });

                if (!response.ok) throw new Error(`토론 시작 실패 (${response.status})`);

                const data = await response.json();
                debateRound = data.round || 1;
                renderDebateTurns(data.turns || []);
            } catch (error) {
                showNotice("debateError", `오류: ${error.message}`);
                document.getElementById("debateComposer").style.display = "block";
            } finally {
                showNotice("debateLoading", "");
                document.getElementById("debateStartButton").disabled = false;
            }
        }

        function renderDebateTurns(turns) {
            const contentElement = document.getElementById("debateContent");
            contentElement.innerHTML = `<div class="notice info" style="display:block;">라운드 ${debateRound} | 주제: ${debateTopic}</div>`;

            turns.forEach(turn => {
                const model = safeLabel(turn.model || turn.actual_label);
                const color = colorFor(model);
                const turnElement = document.createElement("article");
                turnElement.className = "turn";
                turnElement.style.borderLeftColor = color;
                turnElement.innerHTML = `
                    <div class="turn-header" style="color: ${color};">
                        <span class="dot" style="background: ${color};"></span>
                        <span>${model}</span>
                        <span class="badge">${turn.role || "입장"}</span>
                    </div>
                    <div class="content"></div>
                    <div class="debug">
                        요청: ${turn.requested_label || "-"} / 실제: ${turn.actual_label || model}<br>
                        요청 모델: ${turn.requested_model || "-"}<br>
                        실제 모델: ${turn.actual_model || "-"}<br>
                        실제 회사 모델: ${turn.is_real_company_model ? "예" : "아니오"}
                    </div>
                `;
                turnElement.querySelector(".content").textContent = turn.content || "";
                contentElement.appendChild(turnElement);
            });

            const continueButton = document.createElement("button");
            continueButton.className = "primary";
            continueButton.type = "button";
            continueButton.textContent = "다음 라운드";
            continueButton.addEventListener("click", handleDebateContinue);
            contentElement.appendChild(continueButton);
        }

        async function handleDebateContinue(event) {
            const button = event.currentTarget;
            button.disabled = true;
            showNotice("debateError", "");
            showNotice("debateLoading", "다음 라운드를 생성하는 중입니다.");

            try {
                const response = await fetch(`${API_URL}/debate/continue`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ session_id: debateSessionId, topic: debateTopic }),
                });

                if (!response.ok) throw new Error(`토론 계속 실패 (${response.status})`);

                const data = await response.json();
                debateRound = data.round || debateRound + 1;
                renderDebateTurns(data.turns || []);
            } catch (error) {
                showNotice("debateError", `오류: ${error.message}`);
                button.disabled = false;
            } finally {
                showNotice("debateLoading", "");
            }
        }
    </script>
</body>
</html>
