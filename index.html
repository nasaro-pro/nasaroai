<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArenaX</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
            background: #f6f7f9;
            color: #111827;
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #111827;
            color: #fff;
            padding: 18px 20px;
            border-bottom: 1px solid #374151;
            text-align: center;
        }

        header h1 {
            font-size: 22px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        header p {
            margin-top: 4px;
            color: #cbd5e1;
            font-size: 13px;
        }

        .tabs {
            display: flex;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
        }

        .tab {
            flex: 1;
            min-height: 44px;
            border: 0;
            border-bottom: 3px solid transparent;
            background: transparent;
            color: #6b7280;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .tab.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }

        main {
            width: min(1160px, 100%);
            margin: 0 auto;
            flex: 1;
            padding: 18px;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .composer {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 16px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            resize: vertical;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 12px;
            font: inherit;
            font-size: 14px;
            line-height: 1.5;
            color: #111827;
        }

        textarea:focus {
            outline: 2px solid #bfdbfe;
            border-color: #3b82f6;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        button {
            border: 0;
            border-radius: 6px;
            padding: 14px 22px;
            min-height: 44px;
            font: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .primary {
            background: #2563eb;
            color: #fff;
        }

        .secondary {
            background: #f97316;
            color: #fff;
        }

        .muted {
            background: #e5e7eb;
            color: #374151;
        }

        .notice {
            display: none;
            margin-bottom: 16px;
            border-radius: 6px;
            padding: 11px 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        .notice.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .notice.info {
            background: #dbeafe;
            color: #1e40af;
        }

        /* Compare keeps the wide grid view because the goal is simultaneous side-by-side comparison. */
        .compare-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .compare-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-left: 4px solid #9ca3af;
            border-radius: 8px;
            overflow: hidden;
        }

        .compare-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 42px;
            padding: 10px 12px;
            border-bottom: 1px solid #f3f4f6;
            font-size: 13px;
            font-weight: 800;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: #9ca3af;
            flex: 0 0 auto;
        }

        .compare-content {
            min-height: 120px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            padding: 12px;
            font-size: 13px;
            line-height: 1.65;
        }

        .compare-card.error-card {
            border-left-color: #dc2626;
            background: #fef2f2;
        }

        .retry-row {
            padding: 0 12px 12px;
        }

        .retry-row:empty {
            padding: 0;
        }

        .retry-button {
            width: auto;
            min-height: 36px;
            padding: 8px 16px;
            background: #dc2626;
            color: #fff;
            font-size: 13px;
        }

        .retry-button:hover {
            background: #b91c1c;
        }

        /* Debate uses a separate one-way deck carousel instead of the compare grid. */
        .debate-stage {
            position: relative;
            overflow: hidden;
            min-height: 390px;
            margin-top: 14px;
        }

        .debate-card {
            position: absolute;
            top: 0;
            left: 0;
            width: min(780px, 86%);
            min-height: 320px;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-left: 5px solid #9ca3af;
            border-radius: 8px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
            transition: transform 300ms ease-out, opacity 300ms ease-out;
            overflow: hidden;
        }

        .debate-card.active {
            transform: translateX(0) scale(1);
            opacity: 1;
            z-index: 3;
        }

        .debate-card.exit-left {
            transform: translateX(-110%) scale(0.94);
            opacity: 0;
            z-index: 1;
            pointer-events: none;
        }

        .debate-card.preview-next {
            transform: translateX(calc(100% + 18px)) scale(0.92);
            opacity: 0.72;
            z-index: 2;
            cursor: pointer;
            width: min(780px, 86%);
        }

        .debate-card.hidden-card {
            transform: translateX(130%) scale(0.92);
            opacity: 0;
            z-index: 0;
            pointer-events: none;
        }

        .debate-card.error-card {
            border-left-color: #dc2626;
            background: #fef2f2;
        }

        .debate-retry {
            padding: 0 14px 16px;
        }

        .debate-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            border-bottom: 1px solid #f3f4f6;
            font-size: 14px;
            font-weight: 800;
        }

        .debate-badge {
            margin-left: auto;
            border-radius: 4px;
            background: #f3f4f6;
            color: #6b7280;
            padding: 3px 7px;
            font-size: 11px;
            font-weight: 700;
        }

        .debate-card-body {
            max-height: 260px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            padding: 14px;
            font-size: 14px;
            line-height: 1.7;
        }

        .debate-preview-body {
            padding: 14px;
            font-size: 13px;
            line-height: 1.5;
            color: #4b5563;
        }

        .debate-debug {
            padding: 0 14px 14px;
            color: #6b7280;
            font-size: 11px;
            line-height: 1.5;
            word-break: break-word;
        }

        .new-arrival {
            display: none;
            position: absolute;
            right: 18px;
            top: 12px;
            z-index: 5;
            border-radius: 999px;
            background: #f97316;
            color: #fff;
            padding: 5px 9px;
            font-size: 11px;
            font-weight: 800;
        }

        .new-arrival.visible {
            display: inline-block;
        }

        .deck-indicators {
            display: flex;
            justify-content: center;
            gap: 6px;
            min-height: 18px;
            margin-top: 8px;
        }

        .deck-dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: #d1d5db;
        }

        .deck-dot.active {
            background: #2563eb;
        }

        @media (min-width: 760px) {
            .compare-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (min-width: 1080px) {
            .compare-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            main {
                padding: 12px;
            }

            .debate-stage {
                min-height: 410px;
            }

            .debate-card {
                width: 91%;
            }

            .debate-card.preview-next {
                transform: translateX(calc(100% + 8px)) scale(0.92);
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <h1>ArenaX</h1>
            <p>AI 모델 비교와 순차 토론 실험실</p>
        </header>

        <div class="tabs">
            <button class="tab active" type="button" data-tab="compare">AI 비교</button>
            <button class="tab" type="button" data-tab="debate">AI 토론</button>
        </div>

        <main>
            <section id="comparePanel" class="panel active">
                <div class="composer">
                    <textarea id="compareInput" placeholder="비교할 질문을 입력하세요."></textarea>
                    <div class="button-row">
                        <button id="compareButton" class="primary" type="button">비교 시작</button>
                    </div>
                </div>
                <div id="compareError" class="notice error"></div>
                <div id="compareLoading" class="notice info"></div>
                <div id="compareResponses" class="compare-grid"></div>
            </section>

            <section id="debatePanel" class="panel">
                <div id="debateComposer" class="composer">
                    <textarea id="debateInput" placeholder="처음에는 토론 주제를 입력하고, 토론 시작 후에는 새 질문/의견을 입력하세요."></textarea>
                    <div class="button-row">
                        <button id="debateStartButton" class="secondary" type="button">토론 시작</button>
                        <button id="debateContinueButton" class="primary" type="button" disabled>다음 라운드</button>
                        <button id="debateAddInputButton" class="muted" type="button" disabled>새 질문 추가</button>
                    </div>
                </div>
                <div id="debateError" class="notice error"></div>
                <div id="debateLoading" class="notice info"></div>
                <div id="debateContent">
                    <div id="debateStage" class="debate-stage" style="display:none;">
                        <span id="newArrival" class="new-arrival">새 답변 도착</span>
                    </div>
                    <div id="deckIndicators" class="deck-indicators"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_URL = "";
        const AI_COLORS = {
            OpenAI: "#2563eb",
            Anthropic: "#7c3aed",
            Google: "#ca8a04",
            xAI: "#dc2626",
            Perplexity: "#059669",
            meta: "#0f766e",
            qwen: "#0891b2",
            nvidia: "#65a30d",
            deepseek: "#9333ea",
            Unknown: "#6b7280",
        };
        const MODELS = ["OpenAI", "Anthropic", "Google", "xAI", "Perplexity"];

        let debateSessionId = createUUID();
        let debateTopic = "";
        let debateStarted = false;
        let debateInFlight = false;
        let queuedDuringFlight = false;
        let debateCards = [];
        let activeCardIndex = 0;
        let userMovedDeck = false;
        let touchStartX = 0;

        // Kept at module scope so the per-card retry button can re-run a single model.
        let lastCompareMessage = "";
        let compareResponses = {};

        function createUUID() {
            if (crypto.randomUUID) return crypto.randomUUID();
            return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, char => {
                const random = Math.random() * 16 | 0;
                const value = char === "x" ? random : (random & 0x3) | 0x8;
                return value.toString(16);
            });
        }

        function showNotice(id, message) {
            const element = document.getElementById(id);
            element.textContent = message;
            element.style.display = message ? "block" : "none";
        }

        function colorFor(label) {
            return AI_COLORS[label] || AI_COLORS.Unknown;
        }

        function safeLabel(value, fallback = "Unknown") {
            return typeof value === "string" && value.trim() ? value : fallback;
        }

        function summarizeOneLine(text) {
            const clean = String(text || "").replace(/\s+/g, " ").trim();
            return clean.length > 64 ? `${clean.slice(0, 64)}...` : clean || "답변 작성 중...";
        }

        document.querySelectorAll(".tab").forEach(tab => {
            tab.addEventListener("click", () => {
                document.querySelectorAll(".tab").forEach(item => item.classList.remove("active"));
                document.querySelectorAll(".panel").forEach(item => item.classList.remove("active"));
                tab.classList.add("active");
                document.getElementById(`${tab.dataset.tab}Panel`).classList.add("active");
            });
        });

        document.getElementById("compareButton").addEventListener("click", handleCompare);
        document.getElementById("debateStartButton").addEventListener("click", handleDebateStart);
        document.getElementById("debateContinueButton").addEventListener("click", () => handleDebateContinue());
        document.getElementById("debateAddInputButton").addEventListener("click", handleAddUserInput);

        function renderCompareCard(model) {
            const color = colorFor(model);
            const card = document.createElement("article");
            card.className = "compare-card";
            card.id = `response-${model}`;
            card.style.borderLeftColor = color;
            card.innerHTML = `
                <div class="compare-card-header" style="color: ${color};">
                    <span class="dot" style="background: ${color};"></span>
                    <span>${model}</span>
                </div>
                <div id="content-${model}" class="compare-content"></div>
                <div id="retry-${model}" class="retry-row"></div>
            `;
            document.getElementById("compareResponses").appendChild(card);
        }

        function updateCompareCard(model, content, isError = false) {
            const element = document.getElementById(`content-${model}`);
            if (element) element.textContent = content;

            const card = document.getElementById(`response-${model}`);
            if (card) card.classList.toggle("error-card", isError);

            const retry = document.getElementById(`retry-${model}`);
            if (!retry) return;
            if (isError) {
                retry.innerHTML = `<button class="retry-button" type="button">다시 시도</button>`;
                retry.querySelector("button").addEventListener("click", () => retryCompareModel(model));
            } else {
                retry.innerHTML = "";
            }
        }

        function applyStreamChunk(responses, payload) {
            const model = safeLabel(payload.model, "");
            if (!model) return;

            if (payload.error) {
                responses[model] = `${payload.error}\n잠시 후 다시 시도해 주세요.`;
                updateCompareCard(model, responses[model], true);
            } else if (payload.chunk) {
                responses[model] += payload.chunk;
                updateCompareCard(model, responses[model]);
            }
        }

        async function retryCompareModel(model) {
            if (!lastCompareMessage) return;
            compareResponses[model] = "";
            updateCompareCard(model, "다시 시도 중...");
            try {
                await streamCompareModel(model, lastCompareMessage, compareResponses);
            } catch (error) {
                applyStreamChunk(compareResponses, { model, error: "[API 오류 네트워크 실패]" });
            }
        }

        async function streamCompareModel(model, message, responses) {
            const response = await fetch(`${API_URL}/compare/stream`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message, model_name: model }),
            });

            if (!response.ok || !response.body) {
                applyStreamChunk(responses, { model, error: `[API 오류 ${response.status}]` });
                return;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const events = buffer.split("\n\n");
                buffer = events.pop() || "";

                for (const event of events) {
                    const line = event.split("\n").find(item => item.startsWith("data: "));
                    if (!line) continue;

                    try {
                        applyStreamChunk(responses, JSON.parse(line.slice(6)));
                    } catch (error) {
                        applyStreamChunk(responses, { model, error: "[API 오류 JSON 파싱 실패]" });
                    }
                }
            }
        }

        async function handleCompare() {
            const message = document.getElementById("compareInput").value.trim();
            if (!message) return;

            const button = document.getElementById("compareButton");
            const responsesElement = document.getElementById("compareResponses");
            lastCompareMessage = message;
            compareResponses = {};
            const responses = compareResponses;

            button.disabled = true;
            showNotice("compareError", "");
            showNotice("compareLoading", "AI 모델들이 동시에 답변을 생성하는 중입니다.");
            responsesElement.innerHTML = "";

            MODELS.forEach(model => {
                responses[model] = "";
                renderCompareCard(model);
            });

            // Stagger requests by 500 ms per model to avoid hitting OpenRouter free-tier
            // concurrent-request limits. Streams still run in parallel once started.
            const STAGGER_MS = 500;
            const failures = [];
            await Promise.all(MODELS.map((model, index) =>
                new Promise(resolve => setTimeout(resolve, index * STAGGER_MS))
                    .then(() => streamCompareModel(model, message, responses))
                    .catch(error => {
                        failures.push(`${model}: ${error.message}`);
                        applyStreamChunk(responses, { model, error: "[API 오류 네트워크 실패]" });
                    })
            ));

            if (failures.length > 0) {
                showNotice("compareError", `일부 모델 오류: ${failures.join(", ")}`);
            }

            showNotice("compareLoading", "");
            button.disabled = false;
        }

        function setDebateButtons() {
            document.getElementById("debateStartButton").disabled = debateInFlight;
            document.getElementById("debateContinueButton").disabled = !debateStarted || debateInFlight;
            document.getElementById("debateAddInputButton").disabled = !debateStarted;
        }

        function appendLoadingCard(roundNumber, speakerIndex) {
            debateCards.push({
                id: `loading-${roundNumber}-${speakerIndex}-${Date.now()}`,
                loading: true,
                round_number: roundNumber,
                speaker_index: speakerIndex,
                model: `${speakerIndex}번`,
                role: speakerIndex === 1 ? "1번 주장" : speakerIndex === 2 ? "2번 반박" : "3번 종합",
                content: "답변 작성 중...",
            });
            // Auto-advance only when the first speaker of a round arrives so the user
            // can still read speaker 1 and 2 while speakers 2 and 3 are being generated.
            if (!userMovedDeck && speakerIndex === 1) activeCardIndex = debateCards.length - 1;
            renderDebateDeck();
        }

        function replaceLoadingCards(roundNumber, turns) {
            turns.forEach(turn => {
                // Replace any existing card (loading OR previously failed) for this slot,
                // so retried speakers update in place.
                debateCards = debateCards.filter(card => !(
                    card.round_number === roundNumber &&
                    card.speaker_index === turn.speaker_index
                ));
                debateCards.push({
                    ...turn,
                    id: `${turn.round_number}-${turn.speaker_index}-${turn.actual_model || turn.model}`,
                    loading: false,
                });
            });

            // Only auto-advance to the newly arrived card when it is speaker 1
            // (first card of a new round). For speakers 2 and 3, show the
            // newArrival badge instead so the user can finish reading the current card.
            const hasFirstSpeaker = turns.some(turn => turn.speaker_index === 1);
            if (!userMovedDeck && hasFirstSpeaker) {
                activeCardIndex = Math.max(0, debateCards.length - 1);
            } else if (activeCardIndex < debateCards.length - 1) {
                document.getElementById("newArrival").classList.add("visible");
            }
            renderDebateDeck();
        }

        function renderDebateDeck() {
            const stage = document.getElementById("debateStage");
            const indicator = document.getElementById("deckIndicators");
            stage.style.display = debateCards.length ? "block" : "none";
            stage.querySelectorAll(".debate-card").forEach(card => card.remove());

            debateCards.forEach((card, index) => {
                const label = safeLabel(card.model || card.actual_label);
                const color = colorFor(label);
                const isFailed = card.success === false && !card.loading;
                const element = document.createElement("article");
                element.className = "debate-card";
                element.style.borderLeftColor = isFailed ? "#dc2626" : color;
                if (isFailed) element.classList.add("error-card");

                if (index < activeCardIndex) {
                    element.classList.add("exit-left");
                } else if (index === activeCardIndex) {
                    element.classList.add("active");
                } else if (index === activeCardIndex + 1) {
                    element.classList.add("preview-next");
                    element.addEventListener("click", advanceDeck);
                } else {
                    element.classList.add("hidden-card");
                }

                const isActive = index === activeCardIndex;
                const body = isActive ? card.content : summarizeOneLine(card.content);
                element.innerHTML = `
                    <div class="debate-card-header" style="color: ${isFailed ? "#dc2626" : color};">
                        <span class="dot" style="background: ${isFailed ? "#dc2626" : color};"></span>
                        <span>${card.round_number || "-"}라운드 · ${label}</span>
                        <span class="debate-badge">${card.role || "발언"}</span>
                    </div>
                    <div class="${isActive ? "debate-card-body" : "debate-preview-body"}"></div>
                    ${isActive && isFailed ? `<div class="debate-retry"><button class="retry-button" type="button">다시 시도</button></div>` : ""}
                    ${isActive && !isFailed ? `
                        <div class="debate-debug">
                            요청: ${card.requested_label || "-"} / 실제: ${card.actual_label || label}<br>
                            요청 모델: ${card.requested_model || "-"}<br>
                            실제 모델: ${card.actual_model || "-"}<br>
                            실제 회사 모델: ${card.is_real_company_model ? "예" : "아니오"}
                        </div>
                    ` : ""}
                `;
                element.querySelector(isActive ? ".debate-card-body" : ".debate-preview-body").textContent = body;

                if (isActive && isFailed) {
                    element.querySelector(".retry-button").addEventListener("click", event => {
                        event.stopPropagation();
                        retryDebateSpeaker(card.round_number, card.speaker_index);
                    });
                }

                element.addEventListener("touchstart", event => {
                    touchStartX = event.touches[0].clientX;
                }, { passive: true });

                element.addEventListener("touchend", event => {
                    const touchEndX = event.changedTouches[0].clientX;
                    if (touchStartX - touchEndX > 45) advanceDeck();
                }, { passive: true });

                stage.appendChild(element);
            });

            indicator.innerHTML = debateCards.map((_, index) => {
                const active = index === activeCardIndex ? " active" : "";
                return `<span class="deck-dot${active}"></span>`;
            }).join("");
        }

        function advanceDeck() {
            if (activeCardIndex >= debateCards.length - 1) return;
            activeCardIndex += 1;
            userMovedDeck = true;
            document.getElementById("newArrival").classList.remove("visible");
            renderDebateDeck();
        }

        async function requestDebate(endpoint, payload, options = {}) {
            debateInFlight = true;
            setDebateButtons();
            showNotice("debateError", "");
            showNotice("debateLoading", options.loadingText || "토론 라운드를 순차 생성하는 중입니다.");

            const expectedRound = options.expectedRound || 1;
            const expectedSpeaker = options.expectedSpeaker || 1;
            if (options.showLoadingCard) appendLoadingCard(expectedRound, expectedSpeaker);

            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });

                if (!response.ok) throw new Error(`요청 실패 (${response.status})`);

                const data = await response.json();
                if (data.queued) {
                    queuedDuringFlight = true;
                    showNotice("debateLoading", "현재 라운드 진행 중, 다음 라운드에 반영됩니다.");
                    return data;
                }

                replaceLoadingCards(data.round || expectedRound, data.turns || []);
                return data;
            } catch (error) {
                showNotice("debateError", `오류: ${error.message}`);
                debateCards = debateCards.filter(card => !(
                    card.loading &&
                    card.round_number === expectedRound &&
                    card.speaker_index === expectedSpeaker
                ));
                renderDebateDeck();
                return null;
            } finally {
                debateInFlight = false;
                showNotice("debateLoading", "");
                setDebateButtons();
            }
        }

        async function handleDebateStart() {
            const input = document.getElementById("debateInput");
            const topic = input.value.trim();
            if (!topic || debateInFlight) return;

            debateSessionId = createUUID();
            debateTopic = topic;
            debateStarted = true;
            debateCards = [];
            activeCardIndex = 0;
            userMovedDeck = false;
            queuedDuringFlight = false;
            input.value = "";
            input.placeholder = "새 질문/의견을 입력한 뒤 '새 질문 추가'를 누르세요.";
            setDebateButtons();

            await runDebateRoundSequence("/debate/start", {
                session_id: debateSessionId,
                topic: debateTopic,
            }, 1);
        }

        async function runDebateRoundSequence(firstEndpoint, firstPayload, expectedRound) {
            for (let speakerIndex = 1; speakerIndex <= 3; speakerIndex += 1) {
                const endpoint = speakerIndex === 1 ? firstEndpoint : "/debate/continue";
                const payload = speakerIndex === 1
                    ? firstPayload
                    : { session_id: debateSessionId, topic: debateTopic };
                const data = await requestDebate(endpoint, payload, {
                    expectedRound,
                    expectedSpeaker: speakerIndex,
                    showLoadingCard: true,
                    loadingText: `${speakerIndex}번 발언자를 생성하는 중입니다. /debate는 순차 호출, /compare는 병렬 스트리밍입니다.`,
                });
                // Stop only on a hard failure (network/HTTP) or a queued request.
                // A failed speaker turn (success:false) is shown as an error card and we
                // keep going so the remaining speakers are still generated.
                if (!data || data.queued) break;
            }

            if (queuedDuringFlight && !debateInFlight) {
                queuedDuringFlight = false;
                await handleDebateContinue();
            }
        }

        async function retryDebateSpeaker(roundNumber, speakerIndex) {
            if (debateInFlight) return;

            // Flip the failed card back to a loading state while we retry.
            const index = debateCards.findIndex(card =>
                card.round_number === roundNumber && card.speaker_index === speakerIndex);
            if (index !== -1) {
                debateCards[index] = {
                    id: `loading-${roundNumber}-${speakerIndex}-${Date.now()}`,
                    loading: true,
                    round_number: roundNumber,
                    speaker_index: speakerIndex,
                    model: `${speakerIndex}번`,
                    role: speakerIndex === 1 ? "1번 주장" : speakerIndex === 2 ? "2번 반박" : "3번 종합",
                    content: "다시 시도하는 중...",
                };
                renderDebateDeck();
            }

            await requestDebate("/debate/continue", {
                session_id: debateSessionId,
                topic: debateTopic,
                retry_speaker_index: speakerIndex,
            }, {
                expectedRound: roundNumber,
                expectedSpeaker: speakerIndex,
                showLoadingCard: false,
                loadingText: `${speakerIndex}번 발언자를 다시 생성하는 중입니다.`,
            });
        }

        async function handleDebateContinue(userInput = null) {
            if (!debateStarted || debateInFlight) return;
            const nextRound = Math.max(0, ...debateCards.map(card => card.round_number || 0)) + 1;
            await runDebateRoundSequence("/debate/continue", {
                session_id: debateSessionId,
                topic: debateTopic,
                user_input: userInput,
            }, nextRound);
        }

        async function handleAddUserInput() {
            if (!debateStarted) return;
            const input = document.getElementById("debateInput");
            const userInput = input.value.trim();
            if (!userInput) return;
            input.value = "";

            if (debateInFlight) {
                document.getElementById("debateAddInputButton").disabled = true;
                try {
                    const response = await fetch(`${API_URL}/debate/continue`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            session_id: debateSessionId,
                            topic: debateTopic,
                            user_input: userInput,
                        }),
                    });
                    if (!response.ok) throw new Error(`큐잉 실패 (${response.status})`);
                    const data = await response.json();
                    if (data.queued) {
                        queuedDuringFlight = true;
                        showNotice("debateLoading", "현재 라운드 진행 중, 다음 라운드에 반영됩니다.");
                    } else if (data.turns && data.turns.length) {
                        replaceLoadingCards(data.round, data.turns);
                    }
                } catch (error) {
                    showNotice("debateError", `오류: ${error.message}`);
                } finally {
                    setTimeout(setDebateButtons, 800);
                }
                return;
            }

            await handleDebateContinue(userInput);
        }
    </script>
