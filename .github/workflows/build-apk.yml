name: Build Nasaro AI Agent APK

on:
  push:
    paths:
      - 'android-agent/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Build Debug APK
        working-directory: android-agent
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nasaroai-agent-apk
          path: android-agent/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Deploy APK to static folder
        run: |
          cp android-agent/app/build/outputs/apk/debug/app-debug.apk static/nasaroai-agent.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/nasaroai-agent.apk
          git diff --staged --quiet || git commit -m "ci: update nasaroai-agent.apk [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
