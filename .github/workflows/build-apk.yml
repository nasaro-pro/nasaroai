name: Build ArenaX Agent APK

on:
  push:
    paths:
      - 'android-agent/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Build Debug APK
        working-directory: android-agent
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: arenax-agent-apk
          path: android-agent/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "ArenaX Agent APK (최신)"
          body: |
            ## ArenaX 플로팅 에이전트 버튼 앱

            **설치 방법**
            1. 아래 `app-debug.apk` 다운로드
            2. 폰으로 전송 후 설치 (출처를 알 수 없는 앱 허용 필요)
            3. 앱 실행 → 오버레이 권한 허용 → 버튼 켜기
          files: android-agent/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
